<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Školská Databáza Žiakov</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* (Pôvodné CSS ponechávam, pridávam len úpravu pre img) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap');
        :root { --bg-main: #e2e8f0; --text-main: #0f172a; --text-muted: #64748b; --primary: #6366f1; --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); --accent: #14b8a6; --card-bg: rgba(255, 255, 255, 0.85); --border-color: rgba(226, 232, 240, 0.8); --radius-lg: 14px; --radius-xl: 20px; --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        body { background-color: var(--bg-main); font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        
        /* ÚPRAVA PRE AVATARY */
        .student-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Ostatné štýly z tvojho pôvodného kódu... */
        .container { max-width: 1140px; margin: 0 auto; padding: 3rem 1.5rem; }
        .header-area { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 3rem; }
        .stats-box { background: var(--card-bg); padding: 1.25rem 1.75rem; border-radius: var(--radius-xl); border: 1px solid var(--border-color); display: flex; gap: 2rem; }
        .controls-panel { background: var(--card-bg); padding: 1.25rem; border-radius: var(--radius-xl); border: 1px solid var(--border-color); margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: center; }
        .students-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.75rem; }
        .student-card { background: var(--card-bg); border-radius: var(--radius-xl); padding: 1.75rem; transition: var(--transition); }
        .avatar-container { width: 56px; height: 56px; border-radius: 50%; overflow: hidden; background: #e2e8f0; }
        
        /* (Sem doplň zvyšok tvojich pôvodných štýlov...) */
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <div class="header-title">
                <h1>Triedna Databáza</h1>
                <p>Prehľad žiakov, ich veku, výšky a individuálny AI chat</p>
            </div>
            <div class="stats-box">
                <div class="stat-item">
                    <span class="stat-label">Celkovo žiakov</span>
                    <span class="stat-value total" id="totalStudents">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Priemerná výška</span>
                    <span class="stat-value height" id="avgHeight">0 cm</span>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <input type="text" id="searchInput" class="search-input" placeholder="Hľadať žiaka...">
            <div class="sort-group">
                <button class="btn-sort active" id="sortName">Mena</button>
                <button class="btn-sort" id="sortAge">Veku</button>
                <button class="btn-sort" id="sortHeight">Výšky</button>
            </div>
        </div>

        <div class="students-grid" id="studentsGrid"></div>
    </div>

    <script>
        let allStudents = [];
        let currentSort = 'name';

        async function fetchStudents() {
            try {
                const response = await fetch(`/students?sort=${currentSort}`);
                allStudents = await response.json();
                updateStats();
                renderStudents(allStudents);
            } catch (error) { console.error("Chyba:", error); }
        }

        function renderStudents(studentsList) {
            const studentsGrid = document.getElementById('studentsGrid');
            studentsGrid.innerHTML = '';
            studentsList.forEach(student => {
                const isFemale = student.name.trim().endsWith('á') || student.name.trim().endsWith('ová');
                // POUŽITIE DICEBEAR API
                const imgUrl = `https://api.dicebear.com/9.x/adventurer/svg?seed=${encodeURIComponent(student.name)}`;

                const card = document.createElement('div');
                card.className = `student-card`;
                card.innerHTML = `
                    <div class="card-header">
                        <div class="avatar-container">
                            <img src="${imgUrl}" class="student-img" alt="${student.name}">
                        </div>
                        <div class="student-info">
                            <h3>${student.name}</h3>
                            <span class="badge">ID: #${student.id}</span>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div class="card-stat-box"><span class="card-stat-label">Vek</span><span class="card-stat-value">${student.age}</span></div>
                        <div class="card-stat-box"><span class="card-stat-label">Výška</span><span class="card-stat-value">${student.vyska} cm</span></div>
                    </div>
                `;
                studentsGrid.appendChild(card);
            });
        }

        function updateStats() {
            totalStudentsEl.innerText = allStudents.length;
            const avg = Math.round(allStudents.reduce((s, st) => s + st.vyska, 0) / allStudents.length);
            document.getElementById('avgHeight').innerText = `${avg} cm`;
        }

        fetchStudents();
    </script>
</body>
</html>
