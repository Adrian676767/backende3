<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Školská Databáza Žiakov</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap');
        :root { --bg-main: #e2e8f0; --text-main: #0f172a; --primary: #6366f1; --card-bg: rgba(255, 255, 255, 0.85); --radius-xl: 20px; --transition: all 0.3s; }
        body { background-color: var(--bg-main); font-family: 'Inter', sans-serif; margin: 0; padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; }
        .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
        .student-card { background: var(--card-bg); padding: 1.5rem; border-radius: var(--radius-xl); border: 1px solid rgba(0,0,0,0.05); text-align: center; }
        .avatar-container { width: 80px; height: 80px; margin: 0 auto 1rem; border-radius: 50%; overflow: hidden; background: #e2e8f0; }
        .student-img { width: 100%; height: 100%; object-fit: cover; }
        .btn-chat { margin-top: 1rem; padding: 0.6rem 1.2rem; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        /* Chat okno a animácia */
        .ai-chat-window { position: fixed; bottom: 2rem; right: 2rem; width: 350px; height: 450px; background: white; border-radius: var(--radius-xl); box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden; }
        .ai-chat-window.open { display: flex; }
        .chat-header { padding: 1rem; background: var(--primary); color: white; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; }
        .msg { padding: 0.6rem; border-radius: 10px; max-width: 80%; font-size: 0.9rem; }
        .msg.user { background: #e2e8f0; align-self: flex-end; }
        .msg.ai { background: #e0e7ff; align-self: flex-start; }
        .chat-footer { padding: 0.5rem; display: flex; gap: 0.5rem; border-top: 1px solid #eee; }
        .typing-dots { display: flex; gap: 4px; padding: 5px; }
        .typing-dots span { width: 6px; height: 6px; background: #6366f1; border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="students-grid" id="studentsGrid"></div>
    </div>

    <div class="ai-chat-window" id="chatWindow">
        <div class="chat-header"><span>Chat</span><button onclick="document.getElementById('chatWindow').classList.remove('open')">×</button></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-footer">
            <input type="text" id="chatInput" style="flex:1" placeholder="Správa...">
            <button onclick="handleSendMessage()">Odoslať</button>
        </div>
    </div>

    <script>
        let activeStudent = null;

        async function fetchStudents() {
            const res = await fetch('/students');
            const data = await res.json();
            const grid = document.getElementById('studentsGrid');
            data.forEach(student => {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div class="avatar-container"><img src="https://api.dicebear.com/9.x/lorelei/svg?seed=${encodeURIComponent(student.name)}" class="student-img"></div>
                    <h3>${student.name}</h3>
                    <button class="btn-chat" onclick="openChat(${JSON.stringify(student).replace(/"/g, '&quot;')})">Chatovať</button>
                `;
                grid.appendChild(card);
            });
        }

        function openChat(student) {
            activeStudent = student;
            document.getElementById('chatMessages').innerHTML = '';
            const history = JSON.parse(localStorage.getItem(`chat_${student.id}`) || '[]');
            history.forEach(m => appendMessage(m.text, m.sender, false));
            document.getElementById('chatWindow').classList.add('open');
        }

        function appendMessage(text, sender, save = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            if (text === 'typing') {
                msgDiv.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            } else {
                msgDiv.innerText = text;
            }
            document.getElementById('chatMessages').appendChild(msgDiv);
            document.getElementById('chatMessages').scrollTop = 9999;
            
            if (save && activeStudent) {
                const history = JSON.parse(localStorage.getItem(`chat_${activeStudent.id}`) || '[]');
                history.push({ text, sender });
                localStorage.setItem(`chat_${activeStudent.id}`, JSON.stringify(history));
            }
            return msgDiv;
        }

        async function handleSendMessage() {
            const input = document.getElementById('chatInput');
            if (!input.value.trim()) return;
            appendMessage(input.value, 'user');
            const text = input.value;
            input.value = '';
            const loading = appendMessage('typing', 'ai', false);

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text, student_info: activeStudent })
            });
            const data = await res.json();
            loading.remove();
            appendMessage(data.response, 'ai', true);
        }

        fetchStudents();
    </script>
</body>
</html>
